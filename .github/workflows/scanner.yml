name: Repo Scanner

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python main.py --config config.yaml
        env:
          SCANNER_GITHUB_TOKEN: ${{ secrets.SCANNER_GITHUB_TOKEN }}
          # Add as many Groq keys as you want: GROQ_API_KEY_1, GROQ_API_KEY_2, ...
          # The scanner rotates through them automatically on rate limits.
          GROQ_API_KEY_1:       ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:       ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:       ${{ secrets.GROQ_API_KEY_3 }}
          #GROQ_API_KEY_4:       ${{ secrets.GROQ_API_KEY_4 }}
          #GROQ_API_KEY_5:       ${{ secrets.GROQ_API_KEY_5 }}
          #GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
