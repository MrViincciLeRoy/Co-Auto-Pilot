name: Repo Scanner

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — log everything, push nothing"
        type: boolean
        default: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --config config.yaml --dry-run
          else
            python main.py --config config.yaml
          fi
        env:
          SCANNER_GITHUB_TOKEN: ${{ secrets.SCANNER_GITHUB_TOKEN }}
          GROQ_API_KEY_1:       ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:       ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:       ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4:       ${{ secrets.GROQ_API_KEY_4 }}
          GEMINI_API_KEY_1:     ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:     ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:     ${{ secrets.GEMINI_API_KEY_3 }}
