name: Force Scan All Repos

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — log everything, push nothing"
        type: boolean
        default: false
      skip_repo:
        description: "Repo name to skip (this repo — case sensitive)"
        type: string
        default: "CAP"

jobs:
  force-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Force scan all repos
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python force_scan_all.py --config config.yaml --dry-run --skip-repo "${{ github.event.inputs.skip_repo }}"
          else
            python force_scan_all.py --config config.yaml --skip-repo "${{ github.event.inputs.skip_repo }}"
          fi
        env:
          SCANNER_GITHUB_TOKEN: ${{ secrets.SCANNER_GITHUB_TOKEN }}
          GROQ_API_KEY_1:       ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:       ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:       ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4:       ${{ secrets.GROQ_API_KEY_4 }}
          GEMINI_API_KEY_1:     ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:     ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:     ${{ secrets.GEMINI_API_KEY_3 }}
